<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>knitlang webapp</title>
        <script type="module" src="main.js"></script>
        <style>
            @font-face {
                font-family: "Montserrat";
                src: url("Montserrat.woff2") format("woff2");
                font-weight: 100 900;
                font-style: normal;
                font-display: swap;
            }
        
            body {
                font-family: 'Montserrat', 'Avenir Next', 'Calibri', 'Arial';
                font-weight: 300;
                font-size: 1.2rem;
                margin: 0;
                padding: 0;
                /*height: 100%;*/
            }

            #header {
                width: 100%;
                height: 100%;
			    top: 0;
                position: relative;
                background-color: hsl(140, 72%, 45%);
            }

            #header p {
                width: 100%;
			    max-width: 60rem;
			    top: 0em;
			    margin: 0 auto;
                padding: 1rem;
			    position: relative;
                color: white;
                font-weight: 500;
            }

            #wrapper {
                width: 100%;
                max-width: 60rem;
                top: 0;
                position: relative;
                margin: 0 auto;
            }

            #rows {
                top: 0;
                padding: 2rem;
                margin: 1rem;
                position: relative;
                text-align: center;
                font-weight: 400;
                color: hsl(140, 72%, 45%);
                box-shadow: 0 0 5px gray;
                border-radius: 1rem;
            }

            #current-row {
                font-size: 1rem;
                color: hsl(140, 22%, 45%);
            }

            #current-row-number {
                font-size: 5rem;
            }

            #total-rows {
                font-size: 2.5rem;
                color: hsl(140, 22%, 45%);
            }

            #stitches {
                top: 0;
                padding: 2rem;
                margin: 1rem;
                position: relative;
                text-align: center;
                font-weight: 400;
                color: hsl(140, 72%, 45%);
                box-shadow: 0 0 5px gray;
                border-radius: 1rem;
            }

            #stitches-on-needle {
                font-size: 1rem;
                color: hsl(140, 22%, 45%);
            }

            #stitches-number {
                font-size: 5rem;
            }

            #instructions {
                top: 0;
                padding: 2rem;
                margin: 1rem;
                position: relative;
                text-align: center;
                font-weight: 400;
                font-size: 1rem;
                color: hsl(140, 22%, 45%);
                box-shadow: 0 0 5px gray;
                border-radius: 1rem;
                display: flex;
                justify-content: center;
                gap: 3rem;
            }

            .container {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
            }

            .multiplier {
                color: hsl(140, 72%, 45%);
                font-size: 5rem;
            }

            #buttons {
                display: flex;
                gap: 0;
                width: 100%;
            }

            #previous {
                flex: 1;
                padding: 2rem;
                margin: 1rem;
                position: relative;
                text-align: center;
                font-weight: 400;
                color: hsl(140, 72%, 45%);
                box-shadow: 0 0 5px gray;
                border-radius: 1rem;
                font-size: 2.5rem;
                cursor: pointer;
                user-select: none;
            }

            #next {
                flex: 3;
                padding: 2rem;
                margin: 1rem;
                position: relative;
                text-align: center;
                font-weight: 400;
                color: white;
                box-shadow: 0 0 5px gray;
                border-radius: 1rem;
                background-color: hsl(140, 72%, 45%);
                font-size: 2.5rem;
                cursor: pointer;
                user-select: none;
            }
            </style>
    </head>
    <body>
        <div id="header"><p>Sophie Scarf</p></div>
        <div id="wrapper">
            <div id="rows">
                <span id="current-row">CURRENT ROW</span><br>
                <span><span id="current-row-number">55</span><span id="total-rows"> / 355</span></span>
            </div>
            <div id="stitches">
                <span id="stitches-on-needle">STITCHES ON NEEDLE</span><br>
                <span id="stitches-number">22</span>
            </div>
            <div id="instructions">k? slyf3</div>
            <div id="buttons">
                <div id="previous">previous</div>
                <div id="next">next</div>
            </div>
        </div>
    </body>
</html>
